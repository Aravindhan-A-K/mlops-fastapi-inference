services:
  mlflow:
    build: ./mlflow
    container_name: "mlflow-server"
    working_dir: /mlflow
    volumes:
      - ./mlflow_data:/mlflow
    ports:
      - 5000:5000
    command: >
      bash -c "mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/model_artifacts --host 0.0.0.0 --port 5000 --allowed-hosts '*'"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/').raise_for_status()"]
      interval: 20s
      retries: 5
      start_period: 60s

  app:
    build: .
    container_name: app
    working_dir: /app
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/').raise_for_status()"]
      interval: 20s
      retries: 5
      start_period: 60s
    volumes:
      - ./mlflow_data:/mlflow
    ports:
      - 8000:8000
    environment:
      - MODEL_TRACKING_URI=http://mlflow:5000
      - ENVIRONMENT=Production
  
  test:
    image: python:3.12-slim
    container_name: tests
    working_dir: /tests
    depends_on:
      mlflow:
          condition: service_healthy
      app:
          condition: service_healthy
    volumes:
      - ./tests/test_integrations.py:/tests/test_integration.py
    command: >
      bash -c "pip install pytest requests && pytest /tests/test_integration.py -v"

